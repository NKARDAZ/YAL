field-multiselect-hint = "Введите один или несколько вариантов через запятую: {options}"
field-multiselect-hint-custom = "Введите один или несколько вариантов через запятую (можно своё значение): {options}"
field-multiselect-custom-prompt = "Введите дополнительные значения"
field-invalid-option = "Недопустимый вариант. Доступные: {options}"
