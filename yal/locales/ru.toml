ask-excludes     = "Добавить исключения для этого шаблона?"
exclude-hint     = "Введите имена файлов/папок для исключения (по одному, пустая строка — конец):"
excludes-saved   = "Исключения сохранены: {items}"
registered       = "✓ Шаблон '{kind}:{name}' зарегистрирован и установлен в: {path}"

[remove]
action         = "Удаление"
will-remove    = "Будет удалено"
source-builtin = "встроенный"
source-user    = "пользовательский"
confirm        = "Продолжить удаление?"
done           = "✓ Удалено версий: {count}."
nothing-found  = "Ничего не найдено по данному запросу."
