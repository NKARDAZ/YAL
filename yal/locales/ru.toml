builtin-conflict = "'{kind}:{name}' — это имя встроенного шаблона, его нельзя использовать с 'add'. Выберите другое имя."
name-conflict    = "Шаблон '{kind}:{name}' уже зарегистрирован с другим репозиторием:\n      {old_repo}\n      Перезаписать?"
invalid-repo = "Нераспознанный формат репозитория: {repo}\n      Используйте полный URL (https://...), сокращение вида gitlab:user/repo или путь к локальному репозиторию"
repo-required = "Репозиторий не указан. Укажите: yal add <kind>:<name>[@<ref>] from <repo>"
invalid-from = "Неверный синтаксис команды. Используйте: yal add <kind>:<name>[@<ref>] from <repo>"
