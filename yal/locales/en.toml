[common]
yes-variants     = ["y", "yes"]
confirm-prompt   = " [y/N] "

[errors]
unknown-kind     = "Unknown type: '{kind}'. Available: {available}"
unknown-template = "Template '{name}' not found for '{kind}'. Available: {available}"
parse-spec       = "Could not parse: '{spec}'"
parse-spec-hint  = "Format: {fmt}"
cancelled        = "{action} cancelled."
commit-info-fail = "Could not get commit info: {error}"
release-missing  = "Release {ref!r} not found.\n      Available: {available}"
no-releases-warn = "Warning: could not fetch releases ({error})"

[create]
action           = "Installation"
using-local      = "Using local version: {version}"
created          = "✓ Created: {path}"
error            = "Error: {error}"

[update]
action            = "Update"
already-latest    = "Already at latest version: {version}"
already-latest-commit = "Already at latest version: {version} (commit)"
upgrading         = "Updating {kind}:{name}: {old} → {new}"
upgrading-commit  = "Updating {kind}:{name}: {old} → {new} (commit)"
installing        = "Installing {kind}:{name}: {version} (release)"
installing-commit = "Installing {kind}:{name}: {version} (commit)"
installed         = "✓ Installed: {path}"
no-releases       = "Repository has no releases — will clone."
commit-fail       = "Could not get latest commit: {error}"

[download]
confirm      = "\nTemplate '{kind}:{name}' ({source_type} {version}) not found locally.\n      Source: {repo}\n      Install to ~/.yal/templates/{kind}/{name}/{version}/?"
confirm-user = "\nTemplate '{kind}:{name}' ({source_type} {version}) not found locally.\n      Source: {repo}\n      Install to ~/.yal/user-templates/{kind}/{name}/{version}/?"
release   = "release"
commit    = "commit"
release-downloading = "Downloading release {tag}…"
commit-cloning      = "Cloning commit {version}…"
done                = "Installed to: {path}"

[config]
no-config        = "yal.template.toml not found — template will be copied without configuration."
target-not-found = "Error: target file {path} not found."
field-required   = "This field is required."
field-select-hint = "Enter one of: {options}"
field-select-custom = "Enter custom value"
field-multiselect-hint = "Enter one or more, comma-separated: {options}"
field-multiselect-hint-custom = "Enter one or more, comma-separated (any value allowed): {options}"
field-multiselect-custom-prompt = "Enter custom values"
field-invalid-option = "Invalid option. Available: {options}"
field-no-options = "Field '{id}' (type '{type}') has no options defined — falling back to text input."
field-unknown-type = "Field '{id}' has unknown type '{type}' — falling back to text input."
field-picker-hint-single = "(↑/↓ navigate, Enter confirm)"
field-picker-hint-multi = "(↑/↓ navigate, Space toggle, Enter confirm)"
field-required-hint = "(select at least one)"
field-number-invalid = "Enter a valid number."
field-number-range = "Must be between {min} and {max}"
field-list-hint = "Enter one per line, blank line to finish:"
field-pattern-invalid = "Value doesn't match the required format ({pattern})."
field-pattern-invalid-regex = "Field '{id}' has an invalid pattern ({error}) — validation skipped."
executing = "Executing: {name}"
executing-failed = "Command failed: {name}. Error: {error}"

[project]
no-toml                      = "yal.toml not found. Custom commands must be defined in this file."
toml-invalid                 = "yal.toml is corrupted or could not be parsed."
command-not-found            = "Command '{name}' not found."
available-ommands            = "Available commands: {names}"
available-project-commands   = "Available project commands: {names}"
no-commands                  = "No commands defined in yal.toml."
running                      = "Running: {cmd}"
running-inline                = "Running inline script '{name}'"
inline-exec-required         = "Inline script requires an explicit 'exec' (e.g. exec = \"os-bash\")."
inline-exec-unsupported      = "exec '{exec}' does not support running inline code without a file."
inline-args-unsupported      = "exec '{exec}' does not support passing extra arguments to an inline script."
script-not-found             = "Script not found: {path}"
script-failed                = "Command exited with code {code}."
macro-expanding              = "Macro '{from_}' → '{to}'"
macro-empty                  = "Empty macro in command '{name}'."
macro-loop                   = "Circular macro dependency: '{name}'."
arg-unknown                  = "Command '{name}' does not accept argument '{flag}'.\n      Available: {available}"
arg-none                     = "(none)"
arg-invalid-value            = "Invalid value '{value}' for '{flag}'.\n      Allowed: {choices}"

[add]
action           = "Registration"
already-registered = "Template '{kind}:{name}' is already registered with this repository."
builtin-conflict = "'{kind}:{name}' is a built-in template and cannot be registered via 'add'. Choose a different name."
name-conflict    = "Template '{kind}:{name}' is already registered with a different repository:\n      {old_repo}\n      Overwrite?"
invalid-repo = "Unrecognized repository spec: {repo}\n      Use a full URL (https://...), a shortcut like gitlab:user/repo, or a local repository path"
repo-required = "Repository is not specified. Use: yal add <kind>:<name>[@<ref>] from <repo>"
invalid-from = "Invalid command syntax. Use: yal add <kind>:<name>[@<ref>] from <repo>"
invalid-from-keyword = "Expected keyword 'from', got: {keyword}"
ask-excludes     = "Add exclude patterns for this template?"
exclude-hint     = "Enter filenames/folders to exclude (one per line, empty line to finish):"
excludes-saved   = "Excludes saved: {items}"
registered       = "✓ Template '{kind}:{name}' registered and installed to: {path}"

[remove]
action         = "Removal"
will-remove    = "The following will be removed"
source-builtin = "built-in"
source-user    = "user"
confirm        = "Proceed with removal?"
done           = "✓ Removed {count} version(s)."
nothing-found  = "Nothing found matching that spec."
