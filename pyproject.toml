[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "yal"
version = "0.1.0"
description = "Your personal CLI toolkit"
requires-python = ">=3.10"
dependencies = [
    "requests",
    "pyyaml",
    "ruamel.yaml",
    "tomli; python_version < '3.11'",
]

[project.scripts]
yal = "yal.cli:main"

[tool.setuptools.packages.find]
where = ["."]
